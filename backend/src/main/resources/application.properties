spring.datasource.url=jdbc:postgresql://localhost:5432/smartcampus
spring.datasource.username=postgres

spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings — 'update' adds new columns (fullName) automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server
server.port=8080

# File Upload Max Size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Google OAuth2
google.client-id=691199957075-468gd1bolodfkdjui5u6j5rjv50tgmbo.apps.googleusercontent.com

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.smartcampus=DEBUG
